name: Tests

on:
  push:
    branches: [main, refactor]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install -r requirements-test.txt
      - name: Run tests
        run: python -m pytest tests/ -q
